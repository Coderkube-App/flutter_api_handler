name: flutter_api_handler
description: "A robust and customizable Flutter package for standardized HTTP API handling with support for both HTTP and Dio engines, dynamic headers, authentication, multipart requests, logging, and unified response management."
version: 0.0.1

homepage: https://github.com/Coderkube-App
repository: https://github.com/Coderkube-App/flutter_api_handler
issue_tracker: https://github.com/Coderkube-App/flutter_api_handler/issues

environment:
  sdk: ^3.10.8
  flutter: ">=1.17.0"

dependencies:
  connectivity_plus: ^7.1.1
  dio: ^5.8.0+1
  flutter:
    sdk: flutter
  http: ^1.6.0
  logger: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

